# Open Palette Configuration
# Copy to config.yaml and edit to match your setup

# Prompt Optimizer — uses local Ollama LLM to enhance prompts (runs on CPU)
# Install Ollama: curl -fsSL https://ollama.com/install.sh | sh
# Pull a model: ollama pull qwen2.5:14b
prompt_optimizer:
  enabled: false
  ollama_url: "http://[::1]:11434"  # IPv6 localhost — change if Ollama is remote
  model: "qwen2.5:14b"             # Any Ollama model works — configure in Settings

server:
  host: "0.0.0.0"
  port: 7860
  output_dir: "./outputs"
  max_upload_mb: 20

# Default backend for each pipeline component
defaults:
  generator: "comfyui"        # Which backend generates images
  ip_adapter: "comfyui"       # Which backend handles reference image conditioning
  upscaler: "comfyui"         # Which backend upscales
  refiner: null               # Optional refinement pass

# Backend configurations — only configure what you have
backends:
  comfyui:
    enabled: true
    url: "http://127.0.0.1:8188"
    # Models available in your ComfyUI install
    models:
      checkpoints:
        - id: "sd_xl_base_1.0.safetensors"
          label: "SDXL 1.0"
          vram: "7GB"
        - id: "flux1-dev-fp8.safetensors"
          label: "Flux.1 Dev (FP8)"
          vram: "12GB"
        - id: "v1-5-pruned-emaonly.safetensors"
          label: "SD 1.5"
          vram: "4GB"
      ip_adapters:
        - id: "ip-adapter-plus_sdxl_vit-h.safetensors"
          label: "IP-Adapter Plus SDXL"
        - id: "ip-adapter-plus_sd15.safetensors"
          label: "IP-Adapter Plus SD1.5"
      upscalers:
        - id: "RealESRGAN_x4plus.pth"
          label: "RealESRGAN 4x"
        - id: "4x-UltraSharp.pth"
          label: "UltraSharp 4x"
      loras: []
      controlnets: []

  fooocus:
    enabled: false
    url: "http://127.0.0.1:7865"

  a1111:
    enabled: false
    url: "http://127.0.0.1:7861"

  pollinations:
    enabled: true
    api_key: ""  # optional — free without token, higher limits with one from auth.pollinations.ai
    models:
      - id: "flux"
        label: "Flux (via Pollinations)"
      - id: "turbo"
        label: "Turbo (via Pollinations)"

  gemini:
    enabled: false
    api_key: ""  # or set GEMINI_API_KEY env var
    models:
      - id: "gemini-2.5-flash-image"
        label: "Nano Banana (Gemini 2.5 Flash)"
      - id: "gemini-3-pro-image-preview"
        label: "Nano Banana Pro (Gemini 3 Pro)"
      - id: "gemini-3.1-flash-image-preview"
        label: "Nano Banana 2 (Gemini 3.1 Flash)"
      - id: "imagen-4.0-fast-generate-001"
        label: "Imagen 4 Fast"
      - id: "imagen-4.0-generate-001"
        label: "Imagen 4"

  stability:
    enabled: false
    api_key: ""  # or set STABILITY_API_KEY env var
    models:
      - id: "stable-diffusion-xl-1024-v1-0"
        label: "SDXL 1.0"
      - id: "stable-image-core"
        label: "Stable Image Core"

  openai:
    enabled: false
    api_key: ""  # or set OPENAI_API_KEY env var
    models:
      - id: "dall-e-3"
        label: "DALL-E 3"
      - id: "gpt-image-1"
        label: "GPT Image 1"

  replicate:
    enabled: false
    api_key: ""  # or set REPLICATE_API_TOKEN env var
    models:
      - id: "black-forest-labs/flux-1.1-pro"
        label: "Flux 1.1 Pro"
      - id: "stability-ai/sdxl"
        label: "SDXL"

  huggingface:
    enabled: false
    api_key: ""  # or set HF_TOKEN env var
    models:
      - id: "stabilityai/stable-diffusion-xl-base-1.0"
        label: "SDXL 1.0"
